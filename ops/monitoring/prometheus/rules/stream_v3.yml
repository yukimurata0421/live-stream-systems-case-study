groups:
  - name: stream_v3_arena_monitor
    rules:
      - alert: StreamV3ArenaMonitorExporterDown
        expr: up{job="stream_v3_arena_monitor"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: stream_v3 arena-monitor exporter is down

      - alert: StreamV3ArenaMonitorExporterFailing
        expr: stream_v3_exporter_up{job="stream_v3_arena_monitor"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: stream_v3 arena-monitor exporter is failing
