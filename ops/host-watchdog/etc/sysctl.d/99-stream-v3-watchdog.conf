# stream_v3 freeze recovery guardrails.
#
# These settings do not replace hardware watchdog. They make kernel-detected
# lockups/oopses fail closed into reboot, while avoiding hung-task panic until
# a separate false-positive drill is completed.
kernel.watchdog = 1
kernel.nmi_watchdog = 1
kernel.panic = 10
kernel.panic_on_oops = 1
kernel.softlockup_panic = 1
kernel.hardlockup_panic = 1
kernel.hung_task_panic = 0
