apiVersion: v1
kind: ConfigMap
metadata:
  name: stream-v3-shadow-env
  namespace: stream-v3
data:
  STREAM_V3_MODE: streaming
  STREAM_V3_CUTOVER_ENABLE: "1"
  STREAM_K8S_DRY_RUN: "0"
  TEST_MODE: "0"
  TEST_OUTPUT: rtmp
  TAKEOVER_ENABLED: "1"
  V3_FAST_RECOVERY_INTERVAL_SEC: "10"
  STREAM1090_URL: http://stream1090.lan/tar1090/
  BROWSER_URL: http://stream1090.lan/tar1090/
