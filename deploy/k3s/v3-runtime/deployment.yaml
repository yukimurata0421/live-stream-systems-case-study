apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-v3-runtime
  namespace: stream-v3
  labels:
    app.kubernetes.io/name: stream-v3
    app.kubernetes.io/component: runtime
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: stream-v3
      app.kubernetes.io/component: runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stream-v3
        app.kubernetes.io/component: runtime
    spec:
      shareProcessNamespace: true
      containers:
        - name: stream-engine
          image: stream-v3:local
          imagePullPolicy: IfNotPresent
          command: ["/app/src/stream_v3/runtime_entrypoint.sh"]
          args: ["/app/src/stream_core/stream.sh"]
          envFrom:
            - configMapRef:
                name: stream-v3-shadow-env
            - secretRef:
                name: stream-v3-secrets
                optional: true
          env:
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: video,utility
          volumeMounts:
            - name: state
              mountPath: /state
            - name: shm
              mountPath: /dev/shm
            - name: pulse-run
              mountPath: /run/stream-pulse
          resources:
            requests:
              cpu: "1000m"
              memory: 2Gi
            limits:
              cpu: "3500m"
              memory: 6Gi
              nvidia.com/gpu: "1"
        - name: auto-dj
          image: stream-v3:local
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-lc"]
          args:
            - >-
              python3 /app/src/dj/auto_dj.py
              --music-root /music/time_tags
              --now-playing-file /state/now_playing.txt
              --snapshot-file /state/overlay/now_playing.json
              --history-jsonl-file /state/logs/play_history.jsonl
              --pulse-sink stream_v3_sink
              --max-track-sec 600
              --duration-cache-file /music/duration_cache.json
          envFrom:
            - configMapRef:
                name: stream-v3-shadow-env
            - secretRef:
                name: stream-v3-secrets
                optional: true
          volumeMounts:
            - name: state
              mountPath: /state
            - name: music
              mountPath: /music
              readOnly: true
            - name: pulse-run
              mountPath: /run/stream-pulse
          resources:
            requests:
              cpu: "250m"
              memory: 256Mi
            limits:
              cpu: "1000m"
              memory: 1Gi
        - name: network-observer
          image: stream-v3:local
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-lc"]
          args:
            - >-
              PYTHONPATH=/app/src python3 /app/src/watchers/network_observer.py --loop
          envFrom:
            - configMapRef:
                name: stream-v3-shadow-env
            - secretRef:
                name: stream-v3-secrets
                optional: true
          volumeMounts:
            - name: state
              mountPath: /state
          resources:
            requests:
              cpu: "100m"
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: stream-v3-state
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: music
          persistentVolumeClaim:
            claimName: stream-v3-music
        - name: pulse-run
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
