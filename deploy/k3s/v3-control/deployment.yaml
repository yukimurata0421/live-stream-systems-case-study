apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-v3-control
  namespace: stream-v3
  labels:
    app.kubernetes.io/name: stream-v3
    app.kubernetes.io/component: control
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stream-v3
      app.kubernetes.io/component: control
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stream-v3
        app.kubernetes.io/component: control
    spec:
      containers:
        - name: shadow-loop
          image: stream-v3:local
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-lc"]
          args:
            - >-
              PYTHONPATH=/app/src python3 -m stream_v3.control_loop
          envFrom:
            - configMapRef:
                name: stream-v3-shadow-env
            - secretRef:
                name: stream-v3-secrets
                optional: true
          volumeMounts:
            - name: state
              mountPath: /state
            - name: source-v2-readonly
              mountPath: /source-v2-readonly
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: 128Mi
            limits:
              cpu: "1000m"
              memory: 1Gi
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: stream-v3-state
        - name: source-v2-readonly
          persistentVolumeClaim:
            claimName: stream-v2-state-mirror
