apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-v3-observer
  namespace: stream-v3
  labels:
    app.kubernetes.io/name: stream-v3
    app.kubernetes.io/component: observer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stream-v3
      app.kubernetes.io/component: observer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stream-v3
        app.kubernetes.io/component: observer
    spec:
      containers:
        - name: prometheus-exporter
          image: stream-v3:local
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-lc"]
          args:
            - >-
              PYTHONPATH=/app/src python3 /app/ops/scripts/stream_v3_prometheus_exporter.py
              --repo-root /app
              --state-root /state
              --host 0.0.0.0
              --port 9108
          envFrom:
            - configMapRef:
                name: stream-v3-shadow-env
            - secretRef:
                name: stream-v3-secrets
                optional: true
          ports:
            - name: metrics
              containerPort: 9108
          volumeMounts:
            - name: state
              mountPath: /state
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: stream-v3-state
