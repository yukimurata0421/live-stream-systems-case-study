apiVersion: v1
kind: ServiceAccount
metadata:
  name: stream-v3-recovery
  namespace: stream-v3
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: stream-v3-recovery
  namespace: stream-v3
rules:
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: stream-v3-recovery
  namespace: stream-v3
subjects:
  - kind: ServiceAccount
    name: stream-v3-recovery
    namespace: stream-v3
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: stream-v3-recovery
