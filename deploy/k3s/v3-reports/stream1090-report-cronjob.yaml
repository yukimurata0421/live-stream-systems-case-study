apiVersion: batch/v1
kind: CronJob
metadata:
  name: stream-v3-stream1090-report
  namespace: stream-v3
  labels:
    app.kubernetes.io/name: stream-v3
    app.kubernetes.io/component: reports
spec:
  schedule: "*/15 * * * *"
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: stream-v3
            app.kubernetes.io/component: reports
        spec:
          restartPolicy: OnFailure
          containers:
            - name: stream1090-report
              image: stream-v3:local
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-lc"]
              args:
                - >-
                  visual="";
                  if [ "${STREAM1090_REPORT_VISUAL:-0}" = "1" ]; then visual="--visual"; fi;
                  exec /app/bin/stream-prod stream1090-report
                  --sample-sec "${STREAM1090_REPORT_SAMPLE_SEC:-5}"
                  --timeout "${STREAM1090_REPORT_TIMEOUT_SEC:-5}"
                  ${visual}
              envFrom:
                - configMapRef:
                    name: stream-v3-shadow-env
                - secretRef:
                    name: stream-v3-secrets
                    optional: true
              volumeMounts:
                - name: state
                  mountPath: /state
                - name: shm
                  mountPath: /dev/shm
              resources:
                requests:
                  cpu: "100m"
                  memory: 256Mi
                limits:
                  cpu: "1000m"
                  memory: 1Gi
          volumes:
            - name: state
              persistentVolumeClaim:
                claimName: stream-v3-state
            - name: shm
              emptyDir:
                medium: Memory
                sizeLimit: 512Mi
